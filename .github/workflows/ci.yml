name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --all-extras --dev || uv pip install -e .

      - name: Lint with ruff
        run: uv tool run ruff check src/

      - name: Type check with pyright
        # `uv run --with pyright` runs pyright with project deps available so
        # imports resolve correctly. Plain `uv tool run pyright` runs in an
        # isolated env where the project's own deps are invisible.
        run: uv run --with pyright pyright src/

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            uv tool install pytest
            uv tool run pytest -q
          else
            echo "No tests/ directory; skipping pytest"
          fi

      - name: Build wheel + sdist
        run: uv build

      - name: Upload build artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
