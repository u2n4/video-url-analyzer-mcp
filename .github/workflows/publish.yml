# Publish to PyPI via OIDC Trusted Publisher
#
# Activation requirements (must be done BEFORE first tag push):
#   1. PyPI Trusted Publisher entry registered at:
#        https://pypi.org/manage/project/video-url-analyzer-mcp/settings/publishing/
#      - Owner: u2n4
#      - Repository: video-url-analyzer-mcp
#      - Workflow filename: publish.yml
#      - Environment name: pypi
#   2. GitHub Environment "pypi" created at:
#        https://github.com/u2n4/video-url-analyzer-mcp/settings/environments
#
# Trigger: pushing a tag matching `v*.*.*` runs this workflow.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for OIDC Trusted Publishing
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with:` block — OIDC token exchange is automatic.
        # No `password:` — Trusted Publisher provides credentials at runtime.
