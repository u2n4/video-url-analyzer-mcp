# Publish to PyPI via OIDC Trusted Publisher
#
# Activation steps (do these BEFORE uncommenting the block below):
#   1. Publish v1.1.0 manually once with `uv publish` using .pypirc auth.
#   2. Go to https://pypi.org/manage/project/video-url-analyzer-mcp/settings/publishing/
#   3. Add a "Trusted Publisher":
#        - Publisher: GitHub
#        - Owner: u2n4
#        - Repository: video-url-analyzer-mcp
#        - Workflow filename: publish.yml
#        - Environment name: pypi
#   4. In this repo, go to Settings -> Environments -> New environment "pypi".
#      Optionally add required reviewers.
#   5. Uncomment the job below and push a tag matching `v*.*.*`.
#
# Once OIDC is confirmed working once, you can revoke the `.pypirc` token.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

